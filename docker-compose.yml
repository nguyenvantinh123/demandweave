services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: demandweave
      POSTGRES_PASSWORD: demandweave
      POSTGRES_DB: demandweave
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demandweave"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - demandweave_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://demandweave:demandweave@postgres:5432/demandweave
      JWT_SECRET: ${JWT_SECRET:-local-jwt-secret}
      MANDATE_SECRET: ${MANDATE_SECRET:-local-mandate-secret}
      CORS_ORIGINS: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  worker:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    command: python -m apps.api.app.worker
    environment:
      DATABASE_URL: postgresql+psycopg://demandweave:demandweave@postgres:5432/demandweave
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-local-jwt-secret}
      MANDATE_SECRET: ${MANDATE_SECRET:-local-mandate-secret}
    depends_on:
      - api
      - redis

  web:
    build:
      context: .
      dockerfile: infrastructure/docker/web.Dockerfile
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  demandweave_pg:
